# This is an example configuration file. It should be placed in ~/.config/quantifiedme/config.toml (or equivalent for your operating system)
# For more info, read the README.

[me]
name = "john"

# Hours of next day to count as being part of the previous day (for past midnight shenanigans)
date_offset_hours = 5

[data]
categories = "./categories.example.toml"
#habitbull = "~/Downloads/HabitBullData.csv"
#location = "~/location"
#oura = "~/Downloads/oura_2020-02-27T09-07-47.json"
#cronometer = "~/Downloads/dailysummary.csv"        # Cronometer daily nutrition export
#cronometer_servings = "~/Downloads/servings.csv"   # Optional: Cronometer per-food-item log
#freestyle_libre = "~/Downloads/glucosedata.csv"    # Abbott FreeStyle Libre CGM export (via LibreView)
#switchbot = "~/Downloads/switchbot_bedroom.csv"    # SwitchBot Meter/CO2 sensor export (single device)

#[data.switchbot_devices]                           # SwitchBot: multiple devices by name
#bedroom = "~/Downloads/switchbot_bedroom.csv"
#office = "~/Downloads/switchbot_office.csv"

[data.activitywatch]
port = 5666
hostnames = ["fakedata"]

#[data.smartertime_buckets]
#example-hostname = '~/data/smartertime/smartertime_export_example-hostname_2020-01-01_bb7f26aa.awbucket.json'

[locations]
    [locations.gym]
    lat = 55.722379
    long = 13.213125
    accuracy = 0.001
